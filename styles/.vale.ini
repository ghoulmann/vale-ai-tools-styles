; Vale configuration for AI coding tool documentation style guides.
; Common rules (voice, tone, accessibility) are shared across all styles.
; Each product style adds brand-specific terminology and conventions.

StylesPath = .

MinAlertLevel = suggestion

; Windsurf docs (https://docs.windsurf.com/windsurf/)
[windsurf/*.md]
BasedOnStyles = Common, Windsurf

; Claude Code docs (https://code.claude.com/docs/)
[claude-code/*.md]
BasedOnStyles = Common, ClaudeCode

; GitHub Copilot docs (placeholder)
[github-copilot/*.md]
BasedOnStyles = Common, GitHubCopilot
