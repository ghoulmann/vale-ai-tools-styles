# Vale configuration for Windsurf product documentation
# Rank 1: Windsurf, GitHubCopilot, ClaudeCode (product-specific)
# Rank 2: Common, Custom (general quality)

StylesPath = styles
MinAlertLevel = warning

[*.md]
BasedOnStyles = Windsurf, GitHubCopilot, ClaudeCode, Common, Custom

# ═══════════════════════════════════════════════════════════════
# DISABLE CANONICAL (Not used)
# ═══════════════════════════════════════════════════════════════
Canonical = NO

# ═══════════════════════════════════════════════════════════════
# RANK 1: PRODUCT-SPECIFIC RULES
# ═══════════════════════════════════════════════════════════════
# Windsurf terminology and branding
Windsurf.Terminology = error
Windsurf.MisStylings = error
Windsurf.CompetitorNames = error
Windsurf.Acronyms = suggestion
Windsurf.PlanNames = error
Windsurf.UIElements = warning
Windsurf.Spelling = error

# GitHub Copilot branding
GitHubCopilot = error

# Claude Code branding
ClaudeCode = error

# ═══════════════════════════════════════════════════════════════
# RANK 2: COMMON QUALITY GUIDELINES
# ═══════════════════════════════════════════════════════════════
Common.SecondPerson = warning
Common.PassiveVoice = suggestion
Common.LinkText = warning
Common.HeadingStyle = suggestion
Common.AvoidJargon = suggestion
Common.KeyboardShortcuts = suggestion
Common.OxfordComma = suggestion
Common.ImperativeVoice = suggestion
Common.Tone = suggestion

# ═══════════════════════════════════════════════════════════════
# RANK 2: CUSTOM RULES
# ═══════════════════════════════════════════════════════════════
Custom = warning

[*.mdx]
BasedOnStyles = Windsurf, GitHubCopilot, ClaudeCode, Common, Custom
Canonical = NO
Windsurf.Terminology = error
Windsurf.MisStylings = error
GitHubCopilot = error
Common.SecondPerson = warning
Common.PassiveVoice = suggestion
Common.LinkText = warning
